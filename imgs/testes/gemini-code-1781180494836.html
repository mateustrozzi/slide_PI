<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Irmãos Berreta - CSS Grid Layout</title>
    <style>
        /* ----------------------------------------------------
           1. RESET E CONFIGURAÇÕES GERAIS
        ---------------------------------------------------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: sans-serif;
            background-color: #2c3e50;
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ----------------------------------------------------
           2. CONTAINER PRINCIPAL (O ESTRUTURADOR DO GRID)
        ---------------------------------------------------- */
        .grid-container {
            display: grid;
            width: 100%;
            height: 100vh;
            
            /* 4 colunas perfeitamente iguais no mobile */
            grid-template-columns: repeat(4, 1fr);
            
            /* 3 linhas verticais controladas:
               - Linha 1 (auto): Cabeçalho se adapta ao tamanho do Logo/Menu
               - Linha 2 (1fr): Banner ocupa TODO o espaço restante da tela
               - Linha 3 (auto): Rodapé se adapta ao ícone
            */
            grid-template-rows: auto 1fr auto;
            
            /* Bordas ciano simulando as guias do seu rascunho original */
            border: 2px solid #00ffff;
        }

        /* Estilização das guias pontilhadas nas células do grid */
        .grid-item-guide {
            border-left: 1px dotted rgba(0, 255, 255, 0.3);
            border-bottom: 1px dotted rgba(0, 255, 255, 0.3);
            padding: 20px;
        }

        /* ----------------------------------------------------
           3. LINHA 1: CABEÇALHO (LOGO E MENU)
        ---------------------------------------------------- */
        .logo {
            grid-row: 1;
            grid-column: 2 / 4; /* Ocupa as duas colunas centrais */
            text-align: center;
            background-color: rgba(0, 0, 0, 0.3);
            font-weight: bold;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Estilização para quando você plugar seu SVG Inline na div .logo */
        .logo svg {
            height: 60px; /* Controla rigidamente a altura para não estourar o header */
            width: auto;
            display: block;
        }

        .menu-icon {
            grid-row: 1;
            grid-column: 4; /* Última coluna da direita */
            text-align: right;
            font-size: 1.5rem;
            cursor: pointer;
            z-index: 10;
        }

        /* Menu para Desktop (Invisível no Mobile) */
        .desktop-menu {
            display: none;
        }

        /* ----------------------------------------------------
           4. LINHA 2: O BANNER (SISTEMA DE MULTICAMADAS NO GRID)
           Aqui, três elementos dividem rigorosamente o mesmo espaço
        ---------------------------------------------------- */
        
        /* CAMADA 1: O Palco do Slide (Fundo) */
        .banner-slider-stage {
            grid-row: 2;
            grid-column: 1 / -1; /* Cruza todas as colunas de ponta a ponta */
            z-index: 1;
            overflow: hidden; /* Esconde os slides que ficam nas laterais */
            position: relative;
            width: 100%;
            height: 100%;
        }

        /* O Trilho que o JavaScript vai mover horizontalmente */
        .slider-track {
            display: flex;
            width: 500%; /* 5 slides = 500% da largura do palco */
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1); /* Transição suave */
        }

        /* Estilo individual de cada um dos 5 slides */
        .slide {
            width: 20%; /* Cada slide representa exatamente 100% do palco */
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* CAMADA 2: Máscara de Gradiente (Meio) */
        .banner-overlay {
            grid-row: 2;
            grid-column: 1 / -1;
            z-index: 2; /* Fica acima das imagens do carrossel */
            pointer-events: none; /* Cliques passam direto para o slide, se necessário */
            
            /* Mobile Retrato: Gradiente escuro concentrado embaixo para dar leitura ao texto */
            background: linear-gradient(to top, rgba(0, 0, 0, 0.85) 0%, rgba(0, 0, 0, 0.4) 50%, transparent 100%);
        }

        /* CAMADA 3: O Container de Texto (Frente) */
        .banner-text-container {
            grid-row: 2;
            grid-column: 1 / -1;
            z-index: 3; /* No topo absoluto para garantir contraste */
            
            display: grid;
            align-content: end; /* Empurra o texto para a base no mobile */
            padding: 30px;
        }

        .banner-text-container h1 {
            font-size: 2.2rem;
            margin-bottom: 12px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .banner-text-container p {
            font-size: 1rem;
            color: #ecf0f1;
            max-width: 500px;
            line-height: 1.4;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
        }

        /* ----------------------------------------------------
           5. LINHA 3: RODAPÉ
        ---------------------------------------------------- */
        .footer-icon {
            grid-row: 3;
            grid-column: 4; /* Alinhado na última coluna */
            text-align: right;
            font-size: 1.2rem;
            color: #00ffff;
        }

        /* ----------------------------------------------------
           6. DESIGN RESPONSIVO (DESKTOP / WIDE WIDESCREEN)
        ---------------------------------------------------- */
        @media (min-width: 1024px) {
            .grid-container {
                /* No desktop, criamos margens fluidas (1fr) nas extremidades */
                grid-template-columns: 1fr repeat(4, minmax(0, 300px)) 1fr;
            }

            /* Reajuste de posicionamento para o grid com margens laterais */
            .logo {
                grid-column: 3 / 5; /* Desloca proporcionalmente para o centro */
            }

            /* Transição de UX do Menu */
            .menu-icon {
                display: none; /* Remove o hambúrguer no desktop */
            }

            .desktop-menu {
                display: flex;
                grid-row: 1;
                grid-column: 5; /* Alocado na última coluna útil antes da margem */
                justify-content: flex-end;
                align-items: center;
                gap: 20px;
            }

            .desktop-menu a {
                color: #ffffff;
                text-decoration: none;
                font-size: 0.9rem;
                text-transform: uppercase;
                letter-spacing: 1px;
            }

            /* Ajuste das Camadas no Desktop */
            .banner-overlay {
                /* Gradiente muda: agora escurece a ESQUERDA, onde o texto vai morar */
                background: linear-gradient(to right, rgba(0, 0, 0, 0.9) 0%, rgba(0, 0, 0, 0.5) 35%, transparent 100%);
            }

            .banner-text-container {
                align-content: center; /* Centraliza o texto verticalmente */
                justify-content: start; /* Alinha o bloco à esquerda */
                padding-left: 60px;
            }

            .banner-text-container h1 {
                font-size: 4rem; /* Título ganha imponência widescreen */
            }

            .footer-icon {
                grid-column: 5; /* Acompanha o alinhamento da coluna útil */
            }
        }
    </style>
</head>
<body>

    <div class="grid-container">
        
        <div class="grid-item-guide logo">
            Irmãos Berreta
        </div>
        
        <div class="grid-item-guide menu-icon" id="btn-menu">
            ☰
        </div>

        <nav class="grid-item-guide desktop-menu">
            <a href="#">Home</a>
            <a href="#">Serviços</a>
            <a href="#">Contato</a>
        </nav>
        
        <div class="banner-slider-stage">
            <div class="slider-track" id="carrossel-trilho">
                <div class="slide" style="background-color: #34495e;"></div>
                <div class="slide" style="background-color: #16a085;"></div>
                <div class="slide" style="background-color: #2980b9;"></div>
                <div class="slide" style="background-color: #8e44ad;"></div>
                <div class="slide" style="background-color: #2c3e50;"></div>
            </div>
        </div>
        
        <div class="banner-overlay"></div>
        
        <div class="grid-item-guide banner-text-container">
            <h1>Grandes distâncias</h1>
            <p>Lorem ipsum dolor sit amet大量 consectetur adipisicing elit. In nemo odio libero? Delectus...</p>
        </div>
        
        <div class="grid-item-guide footer-icon">
            ✦
        </div>

    </div>

    <script>
        const trilho = document.getElementById('carrossel-trilho');
        const totalSlides = 5;
        let indiceAtual = 0;

        function proximoSlide() {
            // Incrementa o índice. Se chegar no último, volta para o zero (loop infinito)
            indiceAtual = (indiceAtual + 1) % totalSlides;
            
            // Como o nosso trilho total tem 500% de largura, mudar de slide
            // significa mover exatamente frações de 20% (100% / 5 slides)
            const deslocamento = indiceAtual * 20;
            
            trilho.style.transform = `translateX(-${deslocamento}%)`;
        }

        // Executa a transição a cada 4 segundos (4000 milissegundos)
        setInterval(proximoSlide, 4000);

        // Ouvinte opcional para o botão menu mobile apenas para testar clique
        document.getElementById('btn-menu').addEventListener('click', () => {
            alert('Menu lateral expandido! (Implemente a lógica de navegação aqui)');
        });
    </script>
</body>
</html>
